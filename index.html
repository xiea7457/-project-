<!DOCTYPE html>
<html>
  <head>
    <title>望廬山瀑布</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene>
      <a-scene fog="type: exponential; color: #eecfff; density: 0.1">
  <a-sky color="#db9dfc"></a-sky>

  <a-cone position="0 2 -10" radius-bottom="10" radius-top="2" height="15" color="#4b3061"></a-cone>

  <a-cylinder 
    position="0 5 -8.5" 
    radius="0.5" 
    height="12" 
    color="#add8e6"
    opacity="0.8"
    animation="property: position; from: 0 5 -8.5; to: 0 4.8 -8.5; dir: alternate; loop: true; dur: 500">
  </a-cylinder>

  <a-plane position="0 0 -4" rotation="-90 0 0" width="100" height="100" color="#222"></a-plane>

  <a-light type="ambient" color="#666"></a-light>
  <a-light type="point" intensity="2" position="5 10 5" color="#fff"></a-light>
</a-scene>
    </a-scene>
  </body>
</html>
