<!DOCTYPE html>
<html>
  <head>
    <title>望廬山瀑布 </title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene > <!--場景設置(可以用霧氣之類的)-->
    
        <!--宣告要用的glb檔-->
        <a-asset><img id="sky" src="assets/sky.jpg"></a-asset>
        <a-asset-item id="mountain2" src="assets/mountain2.glb"></a-asset-item>
        <a-asset-item id="mountain3" src="assets/mountain3.glb"></a-asset-item>


      <!-- 天空 -->
      <a-sky src="#sky" rotation="0 -90 0"></a-sky>

      <!-- 地面  -->
      <a-plane 
        position="0 -0.5 0"  rotation="-90 0 0"  width="1000" height="1000"   
        color="#3d4d3d" material="roughness: 1; metalness: 0" shadow="receive: true">
      </a-plane>

      <!-- 光源 -->
      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" color="#ffffff" intensity="1" position="1 4 2"></a-light>
    

      <!-- 模型代碼(放置位置) -->
      <a-entity gltf-model="#mountain2" position="10 0 0" scale="10 10 10"></a-entity>
      <a-entity gltf-model="#mountain3" position="-10 0 -15" scale="0.01 0.01 0.01"></a-entity>


    </a-scene>
  </body>
</html>
