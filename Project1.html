<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component"></script>
  </head>

  <body>
   <a-scene>      
    <a-entity environment="preset:forest"></a-entity>
    
    <a-assets>
     <a-asset-item id="mountains" src="assets/mount.glb"></a-asset-item> 
     <a-asset-item id="waterfall" src="assets/waterfall.glb"></a-asset-item>  
     <a-asset-item id="fog" src="purple fog/scene.gltf"></a-asset-item> 
     <a-asset-item id="pond" src="assets/pond.glb"></a-asset-item>
    </a-assets>
    <a-entity 
        gltf-model="#mountains"
        position="0 0 -4.5"
        scale="10 10 10">
    </a-entity>
     <a-entity
        gltf-model="#waterfall"
        position="-13 20 22"
        rotation="0 100 0"
        scale="0.8 1 0.8">
    </a-entity>
    <a-entity
        gltf-model="#waterfall"
        position="-12 15 22"
        rotation="0 120 0"
        scale="0.8 1.5 0.8">
    </a-entity>
    <a-entity
        gltf-model="#waterfall"
        position="-12 10 22"
        rotation="0 100 0"
        scale="1 2 1">
    </a-entity>
    <a-entity
        gltf-model="#waterfall"
        position="-11 3 23"
        rotation="0 140 0"
        scale="1.5 3 1.5">
    </a-entity>
   <a-entity
        gltf-model="#fog"
        position="-14 23 27"
        rotation="0 100 0"
        scale="1 1 1 ">
    </a-entity>
    <a-entity
        gltf-model="#pond"
        position="-11.1 0.5 20"
        rotation="2 50 2"
        scale="0.02 0.025 0.02">
    </a-entity>
    <a-entity id="rig" position="0 0 10"> 
        <a-camera position="-53 4 15" look-controls wasd-controls></a-camera>
    </a-entity>
    <a-box height="33" width="0.3" depth="2" position="-13 9 20" rotation="-2 130 2" color="white"></a-box>
   </a-scene> 
  </body> 
</html>
